<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Alphaboost — Approval Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020617;color:#F1F5F9;font-family:'DM Sans',sans-serif;min-height:100vh}
.header{background:#111827;border-bottom:1px solid #1E2D42;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}.brand span{color:#00C8FF}
.meta{font-size:10px;color:#94A3B8;font-family:'DM Mono',monospace;margin-top:2px}
.vtabs{display:flex;gap:0;border-bottom:1px solid #1E2D42;background:#0D1424;padding:0 24px;overflow-x:auto;position:sticky;top:53px;z-index:100}
.vtab{padding:10px 16px;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.06em;cursor:pointer;border-bottom:2px solid transparent;color:#94A3B8;white-space:nowrap;transition:all .2s}
.vtab:hover{color:#94a3b8}
.vtab.active{color:#F1F5F9;border-bottom-color:#00C8FF}
.vtab-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:6px;vertical-align:middle}
.status-strip{display:flex;gap:10px;padding:12px 24px;background:#111827;border-bottom:1px solid #1E2D42;align-items:center}
.stat{text-align:center;padding:6px 14px;background:#020617;border-radius:6px;border:1px solid #1E2D42}
.stat-n{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.stat-n.g{color:#34d399}.stat-n.y{color:#fbbf24}.stat-n.r{color:#f87171}.stat-n.b{color:#00C8FF}
.stat-l{font-size:9px;color:#94A3B8;font-family:'DM Mono',monospace}
.slideshow{max-width:820px;margin:0 auto;padding:20px}
.progress-bar{display:flex;gap:5px;margin-bottom:20px}
.pdot{flex:1;height:3px;border-radius:2px;background:#1E2D42;cursor:pointer;transition:background .2s}
.pdot.active{background:#00C8FF}.pdot.approved{background:#34d399}.pdot.rejected{background:#f87171}
.card{background:#111827;border:1px solid #1E2D42;border-radius:14px;overflow:hidden}
.card.approved{border-color:#34d399}.card.rejected{border-color:#f87171}
.video-wrap{background:#000;aspect-ratio:16/9;max-height:320px}
.video-wrap video{width:100%;height:100%;object-fit:contain}
.hook-bar{padding:12px 18px;background:#0D1A2B;border-bottom:1px solid #1E2D42}
.hook-label{font-size:9px;color:#64748B;font-family:'DM Mono',monospace;letter-spacing:.12em;margin-bottom:4px}
.hook-text{font-size:14px;color:#F1F5F9;font-style:italic;line-height:1.5}
.plat-header{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1E2D42}
.plat-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.char-label{font-size:10px;font-family:'DM Mono',monospace}
.char-ok{color:#34d399}.char-warn{color:#fbbf24}.char-over{color:#f87171}
.char-bar{height:2px;background:#1E2D42}
.char-fill{height:100%;transition:width .3s}
.copy-area{padding:18px}
textarea{width:100%;background:#020617;border:1px solid #1E2D42;color:#F1F5F9;padding:11px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:110px;outline:none;line-height:1.6}
textarea:focus{border-color:#00C8FF}
.copy-text{font-size:13px;color:#E2E8F0;line-height:1.7;white-space:pre-wrap;min-height:80px}
.card-btns{padding:14px 18px;display:flex;gap:8px;align-items:center;border-top:1px solid #1E2D42;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:6px;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.05em;cursor:pointer;border:none;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-green{background:#059669;color:#fff}.btn-red{background:#dc2626;color:#fff}
.btn-ghost{background:#1E2D42;color:#94a3b8}
.status-pill{margin-left:auto;padding:3px 10px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;font-weight:700}
.sp-approved{background:#064e3b;color:#34d399}.sp-rejected{background:#450a0a;color:#f87171}.sp-pending{background:#1E2D42;color:#fbbf24}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.nav-count{font-family:'DM Mono',monospace;font-size:11px;color:#94A3B8}
.rel-footer{position:sticky;bottom:0;background:#111827;border-top:1px solid #1E2D42;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:100}
.rev-input{background:#020617;border:1px solid #1E2D42;color:#F1F5F9;padding:9px 13px;border-radius:7px;font-size:13px;outline:none;width:180px}
.rev-input:focus{border-color:#00C8FF}
.btn-release{padding:11px 26px;font-size:13px;background:linear-gradient(135deg,#0284C7,#00C8FF);color:#fff;border:none;border-radius:8px;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer}
.btn-release:disabled{opacity:.3;cursor:not-allowed}
.released-wrap{background:#111827;border:1px solid #34d399;border-radius:12px;padding:24px;text-align:center;margin:20px}
.released-wrap h2{font-family:'Syne',sans-serif;color:#34d399;margin-bottom:6px}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;font-family:'DM Mono',monospace;color:#94A3B8;font-size:13px}
.err-box{background:#450a0a;border:1px solid #dc2626;border-radius:7px;padding:11px 16px;color:#f87171;font-size:13px;margin:12px 24px}
.approve-all-v{background:#064e3b;border:none;color:#34d399;padding:5px 12px;border-radius:5px;font-size:10px;font-family:'Syne',sans-serif;cursor:pointer;font-weight:700}
.zoho-panel{width:100%;height:100%;background:#020617;display:flex;flex-direction:column;overflow:hidden}
.zoho-browser{display:flex;flex-direction:column;height:100%}
.zoho-search-bar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#0D1424;border-bottom:1px solid #1E2D42;flex-shrink:0}
.zoho-lib-label{font-size:9px;font-family:'DM Mono',monospace;color:#64748B;letter-spacing:.1em;white-space:nowrap}
.zoho-input{flex:1;background:#020617;border:1px solid #1E2D42;color:#F1F5F9;padding:5px 9px;border-radius:5px;font-size:12px;outline:none;font-family:'DM Sans',sans-serif}
.zoho-input:focus{border-color:#00C8FF}
.zoho-btn{padding:5px 11px;background:#1E2D42;color:#94A3B8;border:none;border-radius:5px;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap}
.zoho-btn:hover{background:#263548;color:#F1F5F9}
.zoho-dl{background:#0284C7;color:#fff;text-decoration:none}
.zoho-dl:hover{background:#0369a1}
.zoho-msg{flex:1;display:flex;align-items:center;justify-content:center;color:#64748B;font-family:'DM Mono',monospace;font-size:12px}
.zoho-grid{flex:1;overflow-y:auto;padding:8px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start}
.zoho-card{width:calc(33.33% - 6px);background:#111827;border:1px solid #1E2D42;border-radius:7px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.zoho-card:hover{border-color:#00C8FF}
.zoho-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:#0D1424;display:block}
.zoho-thumb-icon{display:flex;align-items:center;justify-content:center;font-size:22px;background:#0D1424}
.zoho-card-name{padding:5px 7px;font-size:10px;color:#94A3B8;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zoho-preview{display:flex;flex-direction:column;height:100%}
.zoho-preview>video,.zoho-preview>img{flex:1;width:100%;object-fit:contain;min-height:0;background:#000}
.zoho-preview-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#0D1424;border-top:1px solid #1E2D42;flex-shrink:0}
.zoho-fname{flex:1;font-size:11px;color:#94A3B8;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const VERTICALS = [
  { key: 'ProductManagement', label: 'Product Mgmt',  color: '#34d399' },
  { key: 'ProjectManagement', label: 'Project Mgmt',  color: '#60a5fa' },
  { key: 'DevelopmentQA',     label: 'Dev & QA',      color: '#a78bfa' },
  { key: 'Analytics',         label: 'Analytics',     color: '#fbbf24' },
  { key: 'DesignUX',          label: 'Design & UX',   color: '#f472b6' },
  { key: 'Cybersecurity',     label: 'Cybersecurity', color: '#f87171' },
  { key: 'Legal',             label: 'Legal',         color: '#4ade80' },
];

const ADHOC_PLATFORMS = ['linkedin','youtube','x','tiktok','instagram','facebook','threads'];
const ADHOC_PLATFORM_LABELS = { linkedin:'LinkedIn', youtube:'YouTube', x:'X/Twitter', tiktok:'TikTok', instagram:'Instagram', facebook:'Facebook', threads:'Threads' };

const PLATFORMS = [
  { id: 'linkedin', name: 'LinkedIn',   icon: '💼', limit: 3000 },
  { id: 'facebook', name: 'Facebook',   icon: '👥', limit: 600  },
  { id: 'twitter',  name: 'X/Twitter',  icon: '𝕏',  limit: 280  },
  { id: 'slack',    name: 'Slack',      icon: '💬', limit: 500  },
  { id: 'reddit',   name: 'Reddit',     icon: '🤖', limit: 600  },
  { id: 'discord',  name: 'Discord',    icon: '🎮', limit: 500  },
  { id: 'telegram', name: 'Telegram',   icon: '✈️', limit: 400  },
];

const token    = localStorage.getItem('vc_token');
const username = localStorage.getItem('vc_username');
const H = { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };

function AffiliateLinks() {
  const [affiliates, setAffiliates] = React.useState([]);
  const [loading,    setLoading]    = React.useState(true);
  const [error,      setError]      = React.useState('');
  const [copied,     setCopied]     = React.useState('');

  const V2H = { 'Content-Type': 'application/json', 'x-admin-password': token };

  React.useEffect(() => {
    fetch('/v2/api/admin/affiliates', { headers: V2H })
      .then(r => r.json())
      .then(d => { setAffiliates(d.affiliates || []); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  const getLink = async (code) => {
    try {
      const r = await fetch(`/v2/api/admin/affiliates/${code}/onboarding-link`, { headers: V2H });
      const d = await r.json();
      if (d.link) {
        await navigator.clipboard.writeText(d.link);
        setCopied(code);
        setTimeout(() => setCopied(''), 2500);
      }
    } catch(e) { setError(e.message); }
  };

  if (loading) return <div style={{padding:40,textAlign:'center',color:'#94A3B8'}}>Loading affiliates…</div>;
  if (error)   return <div style={{padding:40,textAlign:'center',color:'#f87171'}}>{error}</div>;

  return (
    <div style={{maxWidth:780,margin:'0 auto',padding:'24px 16px'}}>
      <div style={{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:800,marginBottom:6}}>Affiliate Onboarding Links</div>
      <div style={{fontSize:13,color:'#94A3B8',marginBottom:24}}>Click Copy to get the personalised questionnaire link for each affiliate. Links expire after 7 days.</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {affiliates.map(a => (
          <div key={a.code} style={{background:'#111827',border:'1px solid #1E2D42',borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',gap:14}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:15}}>{a.name}</div>
              <div style={{fontSize:12,color:'#94A3B8',fontFamily:'monospace',marginTop:2}}>{a.code}</div>
            </div>
            <div style={{fontSize:12,color:a.active?'#22C55E':'#f87171',background:a.active?'rgba(34,197,94,0.1)':'rgba(248,113,113,0.1)',padding:'3px 10px',borderRadius:20,border:`1px solid ${a.active?'rgba(34,197,94,0.3)':'rgba(248,113,113,0.3)'}`}}>
              {a.active ? 'Active' : 'Inactive'}
            </div>
            <button
              onClick={() => getLink(a.code)}
              style={{padding:'8px 18px',borderRadius:8,fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:13,cursor:'pointer',border:'none',background: copied===a.code ? '#22C55E' : '#00C8FF',color:'#020617',transition:'all .2s',minWidth:90}}>
              {copied===a.code ? '✓ Copied!' : 'Copy Link'}
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdhocQueue() {
  const [queue,        setQueue]        = useState(null);
  const [activeId,     setActiveId]     = useState(null);
  const [activePlat,   setActivePlat]   = useState('linkedin');
  const [editedCaps,   setEditedCaps]   = useState({});
  const [check1,       setCheck1]       = useState(false);
  const [check2,       setCheck2]       = useState(false);
  const [approving,    setApproving]    = useState(false);
  const [error,        setError]        = useState('');

  useEffect(() => {
    fetch('/api/adhoc/queue', { headers: H }).then(r => r.json()).then(data => {
      setQueue(data);
      if (data.length > 0) setActiveId(data[0].id);
    }).catch(e => setError(e.message));
  }, []);

  const item = queue?.find(i => i.id === activeId);
  const caps = editedCaps[activeId] || item?.platform_captions || {};
  const setCap = (plat, val) => setEditedCaps(e => ({ ...e, [activeId]: { ...(e[activeId] || item?.platform_captions || {}), [plat]: val } }));

  const approve = async () => {
    if (!check1 || !check2) { setError('Both checkboxes must be checked before approving.'); return; }
    setApproving(true); setError('');
    const r = await fetch(`/api/adhoc/approve/${activeId}`, {
      method: 'POST', headers: H,
      body: JSON.stringify({ platform_captions: caps })
    }).then(r => r.json());
    setApproving(false);
    if (r.ok) {
      setQueue(q => q.map(i => i.id === activeId ? { ...i, status: 'approved' } : i));
      setCheck1(false); setCheck2(false);
    } else setError(r.error || 'Approve failed');
  };

  const discard = async () => {
    if (!confirm('Discard this item?')) return;
    await fetch(`/api/adhoc/${activeId}`, { method: 'DELETE', headers: H });
    const newQ = queue.filter(i => i.id !== activeId);
    setQueue(newQ);
    setActiveId(newQ[0]?.id || null);
  };

  if (!queue) return <div className="loading">Loading ad-hoc queue...</div>;

  return (
    <div style={{maxWidth:820,margin:'0 auto',padding:20}}>
      {error && <div className="err-box">{error}</div>}

      {/* Draft warning block */}
      <div style={{background:'#1c1007',border:'1px solid #f59e0b',borderRadius:10,padding:'14px 18px',marginBottom:16}}>
        <div style={{color:'#f59e0b',fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:13,marginBottom:6}}>
          ⚠ DRAFT – HUMAN PERSONALIZATION REQUIRED
        </div>
        <div style={{color:'#fcd34d',fontSize:12,lineHeight:1.7}}>
          You MUST add at least <strong>2 original personalized sentences</strong> in your own words.<br/>
          Goal: The final post must feel <strong>unique and not repetitive</strong> with other posts.
        </div>
      </div>

      {queue.length === 0 && (
        <div style={{textAlign:'center',padding:'48px 20px'}}>
          <div style={{color:'#94A3B8',fontFamily:'monospace',fontSize:13,marginBottom:20}}>No ad-hoc items in queue.</div>
          <a href="/adhoc" target="_blank" style={{display:'inline-block',background:'linear-gradient(135deg,#0284C7,#00C8FF)',color:'#020617',padding:'12px 28px',borderRadius:8,fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:13,letterSpacing:'.06em',textDecoration:'none'}}>✦ Open Ad-Hoc Generator</a>
        </div>
      )}

      {queue.length > 0 && (
        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
          {queue.map(i => (
            <div key={i.id}
              onClick={() => { setActiveId(i.id); setCheck1(false); setCheck2(false); }}
              style={{padding:'5px 12px',borderRadius:20,fontSize:11,cursor:'pointer',fontFamily:'monospace',
                background: i.id===activeId ? '#002D4A' : '#111827',
                border: `1px solid ${i.id===activeId ? '#00C8FF' : '#1E2D42'}`,
                color: i.status==='approved' ? '#34d399' : i.id===activeId ? '#67E8FF' : '#94A3B8'
              }}>{i.topic} · {i.date} {i.status==='approved'?' ✓':''}</div>
          ))}
        </div>
      )}

      {item && (
        <div>
          <div style={{background:'#111827',border:'1px solid #1E2D42',borderRadius:12,overflow:'hidden',marginBottom:12}}>
            {/* Script */}
            <div style={{padding:'12px 16px',borderBottom:'1px solid #1E2D42'}}>
              <div style={{fontSize:9,color:'#00C8FF',fontFamily:'monospace',letterSpacing:'.12em',marginBottom:6}}>VIDEO SCRIPT</div>
              <div style={{fontSize:12,color:'#E2E8F0',lineHeight:1.8,fontFamily:'monospace',whiteSpace:'pre-wrap'}}>{item.video_script}</div>
            </div>

            {/* Media */}
            {item.selectedFiles?.length > 0 && (
              <div style={{padding:'12px 16px',borderBottom:'1px solid #1E2D42'}}>
                <div style={{fontSize:9,color:'#00C8FF',fontFamily:'monospace',letterSpacing:'.12em',marginBottom:8}}>SELECTED MEDIA</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {item.selectedFiles.map(f => (
                    <div key={f.id} style={{textAlign:'center'}}>
                      <div style={{width:80,height:60,background:'#0D1424',borderRadius:6,border:'1px solid #1E2D42',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
                        {f.thumbnail
                          ? <img src={`/api/zoho/thumbnail?url=${encodeURIComponent(f.thumbnail)}`} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'cover'}} alt={f.name}/>
                          : <span style={{fontSize:20}}>{f.isVideo ? '🎬' : '🖼'}</span>}
                      </div>
                      <div style={{fontSize:9,color:'#94A3B8',marginTop:3,maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Platform tabs */}
            <div style={{display:'flex',gap:0,borderBottom:'1px solid #1E2D42',overflowX:'auto'}}>
              {ADHOC_PLATFORMS.map(p => (
                <div key={p} onClick={() => setActivePlat(p)}
                  style={{padding:'8px 14px',fontSize:10,fontFamily:'Syne,sans-serif',fontWeight:700,cursor:'pointer',
                    borderBottom: p===activePlat ? '2px solid #00C8FF' : '2px solid transparent',
                    color: p===activePlat ? '#F1F5F9' : '#94A3B8',whiteSpace:'nowrap'}}>
                  {ADHOC_PLATFORM_LABELS[p]}
                </div>
              ))}
            </div>
            <div style={{padding:'14px 16px'}}>
              <textarea value={caps[activePlat] || ''} onChange={e => setCap(activePlat, e.target.value)}
                style={{width:'100%',background:'#020617',border:'1px solid #1E2D42',color:'#F1F5F9',padding:10,
                  borderRadius:7,fontSize:13,fontFamily:'DM Sans,sans-serif',resize:'vertical',minHeight:120,outline:'none'}}/>
              <div style={{fontSize:10,color:'#94A3B8',fontFamily:'monospace',textAlign:'right',marginTop:4}}>
                {(caps[activePlat]||'').length} chars
              </div>
            </div>
          </div>

          {/* Mandatory checkboxes */}
          <div style={{background:'#111827',border:'1px solid #1E2D42',borderRadius:10,padding:'14px 18px',marginBottom:12}}>
            <label style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10,cursor:'pointer'}}>
              <input type="checkbox" checked={check1} onChange={e => setCheck1(e.target.checked)} style={{marginTop:2,accentColor:'#00C8FF',width:14,height:14}}/>
              <span style={{fontSize:13,color:'#F1F5F9',lineHeight:1.5}}>I have added at least <strong>2 original personalized sentences</strong> in my own words to the caption above.</span>
            </label>
            <label style={{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer'}}>
              <input type="checkbox" checked={check2} onChange={e => setCheck2(e.target.checked)} style={{marginTop:2,accentColor:'#00C8FF',width:14,height:14}}/>
              <span style={{fontSize:13,color:'#F1F5F9',lineHeight:1.5}}>I confirm this content feels <strong>unique and non-repetitive</strong> compared to other recent posts.</span>
            </label>
          </div>

          {item.status === 'approved'
            ? <div style={{textAlign:'center',color:'#34d399',fontFamily:'Syne,sans-serif',fontWeight:700,padding:12}}>✓ Approved</div>
            : (
              <div style={{display:'flex',gap:8}}>
                <button onClick={approve} disabled={approving || !check1 || !check2}
                  style={{flex:1,background: (check1&&check2) ? 'linear-gradient(135deg,#059669,#34d399)' : '#1E2D42',
                    color: (check1&&check2) ? '#fff' : '#94A3B8',border:'none',borderRadius:8,padding:'11px 0',
                    fontSize:13,fontWeight:800,fontFamily:'Syne,sans-serif',cursor: (check1&&check2) ? 'pointer' : 'not-allowed',opacity:approving?.5:1}}>
                  {approving ? 'Approving...' : '✓ Approve & Queue'}
                </button>
                <button onClick={discard}
                  style={{padding:'11px 18px',background:'#450a0a',color:'#f87171',border:'1px solid #dc2626',

                  Discard
                </button>
              </div>
            )
          }
        </div>
      )}
    </div>
  );
}

function ZohoMediaPanel({ vertical }) {
  const [results,  setResults]  = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [selected, setSelected] = useState(null);
  const [q,        setQ]        = useState('');

  const doSearch = (term) => {
    if (!term.trim()) return;
    setLoading(true); setSelected(null);
    fetch(`/api/zoho/search?q=${encodeURIComponent(term)}`, { headers: H })
      .then(r => r.json())
      .then(d => { setResults(d.files || []); setLoading(false); })
      .catch(() => setLoading(false));
  };

  useEffect(() => {
    const kw = VERTICAL_KEYWORDS[vertical] || vertical.toLowerCase();
    setQ(kw); setResults([]); setSelected(null);
    doSearch(kw);
  }, [vertical]);

  const isVideo = f => f.type === 'video' || /\.(mp4|mov|webm|avi)$/i.test(f.name || '');

  if (selected) return (
    <div className="zoho-panel">
      <div className="zoho-preview">
        {isVideo(selected)
          ? <video key={selected.id} controls autoPlay src={`/api/zoho/download/${selected.id}`}/>
          : <img src={selected.thumbnail || `/api/zoho/download/${selected.id}`} alt={selected.name}/>
        }
        <div className="zoho-preview-bar">
          <span className="zoho-fname">{selected.icon} {selected.name}</span>
          <button className="zoho-btn" onClick={() => setSelected(null)}>← Back</button>
          <a className="zoho-btn zoho-dl" href={`/api/zoho/download/${selected.id}`} download={selected.name}>⬇ Download</a>
        </div>
      </div>
    </div>
  );

  return (
    <div className="zoho-panel">
      <div className="zoho-browser">
        <div className="zoho-search-bar">
          <span className="zoho-lib-label">CONTENT LIBRARY</span>
          <input className="zoho-input" value={q} onChange={e => setQ(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && doSearch(q)} placeholder="search…"/>
          <button className="zoho-btn" onClick={() => doSearch(q)}>Search</button>
        </div>
        {loading && <div className="zoho-msg">Searching…</div>}
        {!loading && results.length === 0 && <div className="zoho-msg">No results for "{q}"</div>}
        {!loading && results.length > 0 && (
          <div className="zoho-grid">
            {results.map(f => (
              <div key={f.id} className="zoho-card" onClick={() => setSelected(f)} title={f.name}>
                {f.thumbnail
                  ? <img src={f.thumbnail} className="zoho-thumb" alt=""/>
                  : <div className="zoho-thumb zoho-thumb-icon">{f.icon || '📄'}</div>
                }
                <div className="zoho-card-name">{f.name}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [staged,   setStaged]   = useState(null);
  const [posts,    setPosts]    = useState({});
  const [statuses, setStatuses] = useState({});
  const [editing,  setEditing]  = useState({});
  const [activeV,  setActiveV]  = useState(VERTICALS[0].key);
  const [activePi, setActivePi] = useState(0);
  const [reviewer, setReviewer] = useState(username || '');
  const [released, setReleased] = useState(false);
  const [loading,  setLoading]  = useState(true);
  const [error,    setError]    = useState('');
  const [mode,     setMode]     = useState('scheduled'); // 'scheduled' | 'adhoc'

  useEffect(() => {
    if (!token) { window.location.href = '/'; return; }
    Promise.all([
      fetch('/api/staged', { headers: H }).then(r => { if(r.status===401){window.location.href='/';} return r.json(); }),
      fetch('/api/status', { headers: H }).then(r => r.json()),
    ]).then(([data, status]) => {
      setStaged(data);
      const p={}, s={}, e={};
      VERTICALS.forEach(v => {
        p[v.key]={}; s[v.key]={}; e[v.key]={};
        PLATFORMS.forEach(pl => {
          const post = data.verticals?.[v.key]?.posts?.[pl.id];
          p[v.key][pl.id] = post?.content || '';
          s[v.key][pl.id] = 'pending';
          e[v.key][pl.id] = false;
        });
      });
      setPosts(p); setStatuses(s); setEditing(e);
      if (status.alreadyReleased) setReleased(true);
      setLoading(false);
    }).catch(err => { setError('Load error: ' + err.message); setLoading(false); });
  }, []);

  const globalCounts = { approved:0, pending:0, rejected:0 };
  VERTICALS.forEach(v => PLATFORMS.forEach(pl => {
    const st = statuses[v.key]?.[pl.id] || 'pending';
    globalCounts[st] = (globalCounts[st] || 0) + 1;
  }));
  const allReviewed = globalCounts.pending === 0;
  const canRelease  = allReviewed && reviewer.trim() && globalCounts.approved > 0 && !released;

  function verticalDotColor(vkey) {
    const vs = PLATFORMS.map(pl => statuses[vkey]?.[pl.id] || 'pending');
    if (vs.every(s => s === 'approved')) return '#34d399';
    if (vs.some(s => s === 'rejected'))  return '#f87171';
    if (vs.some(s => s === 'approved'))  return '#fbbf24';
    return '#94A3B8';
  }

  const platform      = PLATFORMS[activePi] || PLATFORMS[0];
  const post          = staged?.verticals?.[activeV]?.posts?.[platform.id];
  const content       = posts[activeV]?.[platform.id] || '';
  const limit         = platform.limit;
  const charPct       = Math.min((content.length / limit) * 100, 100);
  const charCol       = charPct > 100 ? '#f87171' : charPct > 85 ? '#fbbf24' : '#34d399';
  const currentStatus = statuses[activeV]?.[platform.id] || 'pending';
  const vInfo         = VERTICALS.find(v => v.key === activeV) || VERTICALS[0];

  const approve = () => {
    setStatuses(s => ({...s, [activeV]: {...(s[activeV]||{}), [platform.id]: 'approved'}}));
    if (activePi < PLATFORMS.length - 1) setActivePi(i => i+1);
  };
  const reject = () => {
    setStatuses(s => ({...s, [activeV]: {...(s[activeV]||{}), [platform.id]: 'rejected'}}));
    if (activePi < PLATFORMS.length - 1) setActivePi(i => i+1);
  };
  const toggleEdit = () => setEditing(e => ({...e, [activeV]: {...(e[activeV]||{}), [platform.id]: !e[activeV]?.[platform.id]}}));
  const updateContent = val => setPosts(p => ({...p, [activeV]: {...(p[activeV]||{}), [platform.id]: val}}));
  const copyText = () => navigator.clipboard.writeText(content).then(() => alert('Copied!'));

  const approveAllInVertical = () => {
    const s = {};
    PLATFORMS.forEach(pl => s[pl.id] = 'approved');
    setStatuses(st => ({...st, [activeV]: s}));
  };

  const switchVertical = (vkey) => { setActiveV(vkey); setActivePi(0); };

  const release = async () => {
    const verticals = {};
    VERTICALS.forEach(v => {
      verticals[v.key] = { posts: {} };
      PLATFORMS.forEach(pl => {
        verticals[v.key].posts[pl.id] = {
          approved: (statuses[v.key]?.[pl.id] || 'pending') === 'approved',
          content:  posts[v.key]?.[pl.id] || ''
        };
      });
    });
    try {
      const res  = await fetch('/api/approve', { method:'POST', headers:H, body: JSON.stringify({ verticals, reviewer }) });
      const data = await res.json();
      if (data.ok) setReleased(true);
      else setError(data.error || 'Release failed.');
    } catch(err) { setError('Release error: ' + err.message); }
  };

  const logout = () => { fetch('/api/logout',{method:'POST',headers:H}); localStorage.clear(); window.location.href='/'; };

  if (loading) return <div className="loading">Loading 49 pieces of content...</div>;

  return (
    <div>

        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>

          <a href="/affiliate-setup-guide" style={{padding:'5px 12px',borderRadius:6,fontSize:11,fontWeight:700,fontFamily:'Syne,sans-serif',background:'#1d4ed8',color:'#fff',textDecoration:'none',letterSpacing:'.05em'}}>Affiliate Set-up</a>

        </div>

        <div className={`vtab ${mode==='adhoc'?'active':''}`} style={{color: mode==='adhoc'?'#f59e0b':'#94A3B8',borderBottomColor: mode==='adhoc'?'#f59e0b':'transparent'}}

        {mode==='scheduled' && VERTICALS.map(v => (

      {mode==='scheduled' && <>
        <div className="status-strip">
          <div className="stat"><div className="stat-n g">{globalCounts.approved}</div><div className="stat-l">APPROVED</div></div>
          <div className="stat"><div className="stat-n y">{globalCounts.pending}</div><div className="stat-l">PENDING</div></div>
          <div className="stat"><div className="stat-n r">{globalCounts.rejected}</div><div className="stat-l">REJECTED</div></div>
          <div className="stat"><div className="stat-n b">49</div><div className="stat-l">TOTAL</div></div>
          <div style={{flex:1}}/>
          {!released && <button className="approve-all-v" onClick={approveAllInVertical}>✓ Approve all {vInfo.label}</button>}
        </div>

        {error && <div className="err-box">{error}</div>}
        {released && (
          <div className="released-wrap">
            <h2>✓ Released to Distribution</h2>
            <p style={{color:'#94a3b8',fontSize:13}}>{globalCounts.approved} posts approved and queued for distribution.</p>
          </div>
        )}

        <div className="slideshow">
          <div className="progress-bar">
            {PLATFORMS.map((pl, i) => {
              const st = statuses[activeV]?.[pl.id] || 'pending';
              return <div key={pl.id} className={`pdot ${i===activePi?'active':st}`} onClick={() => setActivePi(i)} title={pl.name}/>;
            })}
          </div>

          <div className={`card ${currentStatus !== 'pending' ? currentStatus : ''}`}>
            <div className="video-wrap">
              <ZohoMediaPanel vertical={activeV}/>
            </div>

            {post?.hookQuestion && (
              <div className="hook-bar">
                <div className="hook-label">HOOK — {vInfo.label} / {platform.name}</div>
                <div className="hook-text">"{post.hookQuestion}"</div>
              </div>
            )}

            <div className="plat-header">
              <div className="plat-name"><span style={{fontSize:18}}>{platform.icon}</span>{platform.name}</div>
              <span className={`char-label ${charPct>100?'char-over':charPct>85?'char-warn':'char-ok'}`}>{content.length} / {limit}</span>
            </div>
            <div className="char-bar"><div className="char-fill" style={{width:`${charPct}%`,background:charCol}}/></div>

            <div className="copy-area">
              {editing[activeV]?.[platform.id]
                ? <textarea value={content} onChange={e => updateContent(e.target.value)}/>
                : <div className="copy-text">{content || <span style={{color:'#94A3B8'}}>No content</span>}</div>
              }
            </div>

            {!released && (
              <div className="card-btns">
                <button className="btn btn-green" onClick={approve}>✓ Approve</button>
                <button className="btn btn-red"   onClick={reject}>✗ Reject</button>
                <button className="btn btn-ghost" onClick={toggleEdit}>{editing[activeV]?.[platform.id] ? 'Done' : '✏ Edit'}</button>
                <button className="btn btn-ghost" onClick={copyText}>⎘ Copy</button>
                <span className={`status-pill sp-${currentStatus}`}>{currentStatus.toUpperCase()}</span>
              </div>
            )}
          </div>

          <div className="nav-row">
            <button className="btn btn-ghost" onClick={() => setActivePi(i => Math.max(0,i-1))} disabled={activePi===0}>← Prev</button>
            <span className="nav-count">{vInfo.label} · {activePi+1} of {PLATFORMS.length} · {platform.name}</span>
            <button className="btn btn-ghost" onClick={() => setActivePi(i => Math.min(PLATFORMS.length-1,i+1))} disabled={activePi===PLATFORMS.length-1}>Next →</button>
          </div>
        </div>

        {!released && (
          <div className="rel-footer">
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:10,color:'#94A3B8',fontFamily:'monospace'}}>REVIEWER</span>
              <input className="rev-input" value={reviewer} onChange={e => setReviewer(e.target.value)} placeholder="Your name"/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              {!allReviewed && <span style={{fontSize:11,color:'#fbbf24',fontFamily:'monospace'}}>{globalCounts.pending} pending</span>}
              <button className="btn-release" onClick={release} disabled={!canRelease}>
                {!allReviewed ? `${globalCounts.pending} remaining →` : !reviewer.trim() ? 'Enter reviewer name' : `Release ${globalCounts.approved} posts →`}
              </button>
            </div>
          </div>
        )}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
