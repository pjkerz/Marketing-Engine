<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Alphaboost — Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020617;color:#F1F5F9;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#111827;border:1px solid #1E2D42;border-radius:16px;padding:44px 40px;width:100%;max-width:400px;margin:20px}
.lock{font-size:36px;text-align:center;margin-bottom:16px}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:#F1F5F9;margin-bottom:4px;text-align:center}
.brand span{color:#00C8FF}
.sub{font-size:11px;color:#64748B;letter-spacing:.12em;margin-bottom:8px;font-family:monospace;text-align:center}
.desc{font-size:13px;color:#94A3B8;margin-bottom:28px;text-align:center;line-height:1.6}
label{display:block;font-size:11px;color:#94A3B8;letter-spacing:.1em;margin-bottom:6px;font-family:monospace}
input{width:100%;background:#020617;border:1px solid #1E2D42;color:#F1F5F9;padding:12px 16px;border-radius:8px;font-size:14px;outline:none;margin-bottom:20px;font-family:'DM Sans',sans-serif}
input:focus{border-color:#00C8FF;box-shadow:0 0 0 2px rgba(0,200,255,.15)}
button{width:100%;background:linear-gradient(135deg,#0284C7,#00C8FF);color:#020617;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.05em}
button:hover{opacity:.9}
button:disabled{opacity:.4;cursor:not-allowed}
.msg{font-size:13px;margin-top:16px;text-align:center;min-height:20px;line-height:1.5}
.msg.ok{color:#34d399}
.msg.err{color:#f87171}
.back{display:block;text-align:center;margin-top:20px;font-size:12px;color:#64748B;text-decoration:none;font-family:monospace;letter-spacing:.05em}
.back:hover{color:#94A3B8}
</style>
</head>
<body>
<div class="card">
  <div class="lock">🔑</div>
  <div class="brand"><span>ALPHA</span>NOETIC</div>
  <div class="sub">PASSWORD RESET</div>
  <div class="desc">Enter your username or email address to receive a password reset link.</div>
  <label>USERNAME OR EMAIL</label>
  <input type="text" id="email" placeholder="e.g. Paul or yourname@example.com" autocomplete="username" onkeydown="if(event.key==='Enter')send()"/>
  <button id="btn" onclick="send()">SEND RESET LINK →</button>
  <div class="msg" id="msg"></div>
  <a class="back" href="/">← Back to sign in</a>
</div>
<script>
async function send() {
  const email = document.getElementById('email').value.trim();
  const msg   = document.getElementById('msg');
  const btn   = document.getElementById('btn');
  msg.textContent = '';
  msg.className   = 'msg';
  if (!email) { msg.textContent = 'Please enter your username or email.'; msg.className = 'msg err'; return; }
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    const r = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier: email })
    });
    const d = await r.json();
    if (d.resetUrl) {
      msg.innerHTML = 'Email not configured. <strong>Use this link to reset:</strong><br><br><a href="' + d.resetUrl + '" style="color:#00C8FF;word-break:break-all;font-size:11px">' + d.resetUrl + '</a>';
    } else {
      msg.textContent = 'Reset link sent — check your inbox (and spam folder).';
    }
    msg.className = 'msg ok';
    btn.textContent = 'SENT ✓';
  } catch {
    msg.textContent = 'Connection error. Please try again.';
    msg.className = 'msg err';
    btn.disabled = false;
    btn.textContent = 'SEND RESET LINK →';
  }
}
</script>
</body>
</html>
