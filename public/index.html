<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google-site-verification" content="u_97M9Nks9CZYWC6AREy3sSwmL1AiR3B62WWBEse-lA" />
  <title>Alphaboost — Approval Console</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#020617;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh}
    .header{background:#0f172a;border-bottom:1px solid #1e293b;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
    .brand{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}.brand span{color:#3b82f6}
    .meta{font-family:'DM Mono',monospace;font-size:11px;color:#475569}
    .badge{background:#1e293b;padding:4px 10px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace}
    .badge.legal{color:#a78bfa}.badge.pm{color:#34d399}.badge.dev{color:#60a5fa}
    .badge.analytics{color:#fbbf24}.badge.design{color:#f472b6}.badge.sec{color:#f87171}.badge.project{color:#4ade80}
    .main{padding:32px;max-width:1400px;margin:0 auto}
    .status-bar{display:flex;gap:16px;margin-bottom:24px}
    .stat{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:12px 20px;text-align:center}
    .stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
    .stat-num.approved{color:#34d399}.stat-num.pending{color:#fbbf24}.stat-num.rejected{color:#f87171}
    .stat-label{font-size:11px;color:#475569;font-family:'DM Mono',monospace;margin-top:2px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
    .card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;overflow:hidden}
    .card.approved{border-color:#34d399}.card.rejected{border-color:#f87171}
    .card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e293b}
    .platform-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
    .char-bar{height:4px;background:#1e293b;border-radius:2px;margin:8px 16px 0}
    .char-fill{height:100%;border-radius:2px;background:#3b82f6;transition:width 0.3s}
    .char-fill.warn{background:#fbbf24}.char-fill.over{background:#f87171}
    .char-count{font-size:10px;font-family:'DM Mono',monospace;color:#475569;padding:4px 16px 8px;text-align:right}
    .content-area{padding:12px 16px;min-height:120px}
    textarea{width:100%;background:#020617;border:1px solid #1e293b;color:#e2e8f0;padding:10px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:100px;outline:none}
    textarea:focus{border-color:#3b82f6}
    .card-actions{padding:12px 16px;display:flex;gap:8px;border-top:1px solid #1e293b}
    .btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.05em;cursor:pointer;border:none;transition:opacity .2s}
    .btn:hover{opacity:.85}
    .btn-approve{background:#059669;color:#fff}.btn-reject{background:#dc2626;color:#fff}
    .btn-edit{background:#1e293b;color:#94a3b8}
    .btn-approve-all{background:linear-gradient(135deg,#059669,#34d399);color:#fff;padding:10px 24px;font-size:13px}
    .btn-release{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;padding:12px 32px;font-size:14px}
    .btn-release:disabled{opacity:.4;cursor:not-allowed}
    .footer{padding:24px 32px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #1e293b;margin-top:32px}
    .reviewer{display:flex;align-items:center;gap:12px}
    .reviewer input{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;padding:8px 14px;border-radius:8px;font-size:13px;outline:none;width:200px}
    .reviewer input:focus{border-color:#3b82f6}
    .released{background:#0f172a;border:1px solid #34d399;border-radius:12px;padding:32px;text-align:center;margin-bottom:24px}
    .released h2{font-family:'Syne',sans-serif;color:#34d399;margin-bottom:8px}
    .loading{display:flex;align-items:center;justify-content:center;height:200px;font-family:'DM Mono',monospace;color:#475569}
    .tag{font-family:'DM Mono',monospace;font-size:12px;color:#3b82f6}
    .logout-btn{background:none;border:1px solid #1e293b;color:#475569;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
    .logout-btn:hover{border-color:#475569;color:#e2e8f0}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const PLATFORMS = {
  linkedin: 'LinkedIn', facebook: 'Facebook', twitter: 'X / Twitter',
  slack: 'Slack', reddit: 'Reddit', discord: 'Discord', telegram: 'Telegram'
};

function App() {
  const [staged, setStaged]     = useState(null);
  const [posts, setPosts]       = useState({});
  const [statuses, setStatuses] = useState({});
  const [editing, setEditing]   = useState({});
  const [reviewer, setReviewer] = useState('');
  const [released, setReleased] = useState(false);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState('');
  const token = localStorage.getItem('vc_token');
  const username = localStorage.getItem('vc_username');

  const headers = { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };

  useEffect(() => {
    if (!token) { window.location.href = '/'; return; }
    setReviewer(username || '');
    fetch('/api/staged', { headers })
      .then(r => { if (r.status === 401) { window.location.href = '/'; } return r.json(); })
      .then(data => {
        setStaged(data);
        const p = {}, s = {}, e = {};
        Object.entries(data.posts || {}).forEach(([id, post]) => {
          p[id] = post.content || '';
          s[id] = 'pending';
          e[id] = false;
        });
        setPosts(p); setStatuses(s); setEditing(e);
        setLoading(false);
      })
      .catch(() => { setError('Could not load staged content.'); setLoading(false); });

    fetch('/api/status', { headers })
      .then(r => r.json())
      .then(d => { if (d.alreadyReleased) setReleased(true); });
  }, []);

  const approve  = id => setStatuses(s => ({...s, [id]: 'approved'}));
  const reject   = id => setStatuses(s => ({...s, [id]: 'rejected'}));
  const toggleEdit = id => setEditing(e => ({...e, [id]: !e[id]}));
  const updatePost = (id, val) => setPosts(p => ({...p, [id]: val}));
  const approveAll = () => {
    const s = {};
    Object.keys(statuses).forEach(id => s[id] = 'approved');
    setStatuses(s);
  };

  const counts = {
    approved: Object.values(statuses).filter(s => s === 'approved').length,
    pending:  Object.values(statuses).filter(s => s === 'pending').length,
    rejected: Object.values(statuses).filter(s => s === 'rejected').length,
  };

  const allReviewed = counts.pending === 0;
  const canRelease  = allReviewed && reviewer.trim() && counts.approved > 0;

  const release = async () => {
    const approvedPosts = {};
    Object.entries(statuses).forEach(([id, status]) => {
      approvedPosts[id] = { approved: status === 'approved', content: posts[id] };
    });
    const res  = await fetch('/api/approve', { method: 'POST', headers, body: JSON.stringify({ approvedPosts }) });
    const data = await res.json();
    if (data.ok) setReleased(true);
    else setError(data.error || 'Release failed.');
  };

  const logout = () => {
    fetch('/api/logout', { method: 'POST', headers });
    localStorage.removeItem('vc_token');
    localStorage.removeItem('vc_username');
    window.location.href = '/';
  };

  if (loading) return <div className="loading">Loading staged content...</div>;

  return (
    <div>
      <div className="header">
        <div>
          <div className="brand"><span>ALPHA</span>NOETIC <span style={{color:'#475569',fontSize:14}}>/ VideoClaw</span></div>
          {staged && <div className="meta">{staged.date} · {staged.vertical} · <span className="tag">{staged.tag}</span></div>}
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontSize:12,color:'#475569',fontFamily:'DM Mono,monospace'}}>Logged in as {username}</span>
          <button className="logout-btn" onClick={logout}>Log out</button>
        </div>
      </div>

      <div className="main">
        {error && <div style={{background:'#450a0a',border:'1px solid #dc2626',borderRadius:8,padding:12,marginBottom:16,color:'#f87171',fontSize:13}}>{error}</div>}

        {released && (
          <div className="released">
            <h2>✓ Content Released to Distribution</h2>
            <p style={{color:'#94a3b8',fontSize:13}}>The pipeline will now distribute to all approved platforms.</p>
          </div>
        )}

        <div className="status-bar">
          <div className="stat"><div className="stat-num approved">{counts.approved}</div><div className="stat-label">APPROVED</div></div>
          <div className="stat"><div className="stat-num pending">{counts.pending}</div><div className="stat-label">PENDING</div></div>
          <div className="stat"><div className="stat-num rejected">{counts.rejected}</div><div className="stat-label">REJECTED</div></div>
          <div style={{flex:1}}/>
          {!released && <button className="btn btn-approve-all" onClick={approveAll}>Approve All</button>}
        </div>

        <div className="grid">
          {Object.entries(PLATFORMS).map(([id, name]) => {
            const post    = staged?.posts?.[id];
            const content = posts[id] || '';
            const limit   = post?.charLimit || 500;
            const pct     = Math.min((content.length / limit) * 100, 100);
            const status  = statuses[id];
            const isEdit  = editing[id];
            return (
              <div key={id} className={`card ${status !== 'pending' ? status : ''}`}>
                <div className="card-header">
                  <span className="platform-name">{name}</span>
                  <span className={`badge`} style={{color: status==='approved'?'#34d399':status==='rejected'?'#f87171':'#fbbf24'}}>
                    {status.toUpperCase()}
                  </span>
                </div>
                <div className="char-bar">
                  <div className="char-fill" style={{width:`${pct}%`,background:pct>100?'#f87171':pct>85?'#fbbf24':'#3b82f6'}}/>
                </div>
                <div className="char-count">{content.length} / {limit}</div>
                <div className="content-area">
                  {isEdit
                    ? <textarea value={content} onChange={e => updatePost(id, e.target.value)}/>
                    : <div style={{fontSize:13,lineHeight:1.6,color:'#cbd5e1',whiteSpace:'pre-wrap'}}>{content}</div>
                  }
                </div>
                {!released && (
                  <div className="card-actions">
                    <button className="btn btn-approve" onClick={() => approve(id)}>✓ Approve</button>
                    <button className="btn btn-reject"  onClick={() => reject(id)}>✗ Reject</button>
                    <button className="btn btn-edit"    onClick={() => toggleEdit(id)}>{isEdit ? 'Done' : 'Edit'}</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {!released && (
          <div className="footer">
            <div className="reviewer">
              <span style={{fontSize:12,color:'#475569',fontFamily:'DM Mono,monospace'}}>REVIEWER</span>
              <input value={reviewer} onChange={e => setReviewer(e.target.value)} placeholder="Your name"/>
            </div>
            <button className="btn btn-release" onClick={release} disabled={!canRelease}>
              {!allReviewed ? `Review ${counts.pending} remaining` : !reviewer.trim() ? 'Enter reviewer name' : `Release ${counts.approved} platforms →`}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
