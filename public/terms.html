<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Alphaboost — Affiliate Terms &amp; Conditions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020617;color:#cbd5e1;font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.8}

.header{background:#0f172a;border-bottom:1px solid #1e293b;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#f1f5f9;text-decoration:none}
.brand span{color:#00C8FF}
.back-btn{font-size:12px;color:#64748B;text-decoration:none;font-family:'DM Mono',monospace;letter-spacing:.05em;transition:color .15s}
.back-btn:hover{color:#00C8FF}

.hero{background:linear-gradient(135deg,rgba(0,200,255,0.06),rgba(34,197,94,0.04));border-bottom:1px solid #1e293b;padding:48px 32px 40px;text-align:center}
.hero-badge{display:inline-block;background:rgba(0,200,255,0.1);border:1px solid rgba(0,200,255,0.2);color:#00C8FF;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.1em;padding:4px 14px;border-radius:20px;margin-bottom:16px;text-transform:uppercase}
.hero h1{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#f1f5f9;margin-bottom:8px;letter-spacing:-0.5px}
.hero-sub{font-size:13px;color:#64748B;font-family:'DM Mono',monospace}

.container{max-width:820px;margin:0 auto;padding:48px 32px 80px}

.toc{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:24px 28px;margin-bottom:40px}
.toc-title{font-family:'DM Mono',monospace;font-size:11px;color:#64748B;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.toc ol{padding-left:20px;display:grid;grid-template-columns:1fr 1fr;gap:4px 24px}
.toc li{font-size:13px}
.toc a{color:#94a3b8;text-decoration:none;transition:color .15s}
.toc a:hover{color:#00C8FF}
@media(max-width:560px){.toc ol{grid-template-columns:1fr}}

#terms-body h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#f1f5f9;margin:40px 0 12px;padding-top:8px;border-top:1px solid #1e293b;letter-spacing:-0.3px}
#terms-body h2:first-child{margin-top:0;border-top:none}
#terms-body h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#e2e8f0;margin:28px 0 10px}
#terms-body p{font-size:14px;color:#94a3b8;margin-bottom:14px}
#terms-body ul,#terms-body ol{padding-left:22px;margin-bottom:16px}
#terms-body li{font-size:14px;color:#94a3b8;margin-bottom:6px}
#terms-body strong{color:#cbd5e1}
#terms-body a{color:#00C8FF;text-decoration:none}
#terms-body a:hover{text-decoration:underline}
#terms-body em{color:#64748B}

.placeholder-banner{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:8px;padding:12px 18px;margin-bottom:28px;font-size:12px;color:#fbbf24;font-family:'DM Mono',monospace;display:none}

.footer{background:#0f172a;border-top:1px solid #1e293b;padding:24px 32px;text-align:center;font-size:12px;color:#475569;font-family:'DM Mono',monospace}
.footer a{color:#64748B;text-decoration:none}
.footer a:hover{color:#94a3b8}

.loading{text-align:center;padding:80px 0;color:#475569;font-family:'DM Mono',monospace;font-size:13px}
</style>
</head>
<body>

<header class="header">
  <a class="brand" href="/"><span>ALPHA</span>NOETIC</a>
  <a class="back-btn" href="/">← Back to sign in</a>
</header>

<div class="hero">
  <div class="hero-badge">Legal</div>
  <h1>Affiliate Terms &amp; Conditions</h1>
  <div class="hero-sub" id="hero-date">Loading…</div>
</div>

<div class="container">
  <div class="placeholder-banner" id="placeholder-banner">
    ⚠ This document contains placeholder content and has not been reviewed by legal counsel. Do not rely on it as legal advice.
  </div>

  <div class="toc">
    <div class="toc-title">Contents</div>
    <ol id="toc-list"><li>Loading…</li></ol>
  </div>

  <div id="terms-body"><div class="loading">Loading terms…</div></div>
</div>

<footer class="footer">
  &copy; 2026 Alphanoetic Ltd &nbsp;&bull;&nbsp;
  <a href="/privacy">Privacy Policy</a> &nbsp;&bull;&nbsp;
  <a href="/">Affiliate Login</a>
</footer>

<script>
async function loadTerms() {
  try {
    const r = await fetch('/api/terms');
    const d = await r.json();
    const body = document.getElementById('terms-body');
    body.innerHTML = d.content || '<p>No terms content published yet.</p>';

    // Show placeholder banner if content contains PLACEHOLDER
    if ((d.content || '').includes('PLACEHOLDER')) {
      document.getElementById('placeholder-banner').style.display = 'block';
    }

    // Extract date from first <em> if present
    const dateMatch = (d.content || '').match(/Last updated[^<]*/i);
    document.getElementById('hero-date').textContent = dateMatch ? dateMatch[0] : 'Affiliate Program Agreement';

    // Auto-build TOC from h2/h3 headings
    buildToc();
  } catch(e) {
    document.getElementById('terms-body').innerHTML = '<p style="color:#f87171">Failed to load terms. Please try again.</p>';
  }
}

function buildToc() {
  const headings = document.querySelectorAll('#terms-body h2, #terms-body h3');
  const list     = document.getElementById('toc-list');
  if (!headings.length) { list.innerHTML = '<li>No sections found</li>'; return; }
  list.innerHTML = '';
  headings.forEach((h, i) => {
    if (h.tagName === 'H2') {
      const id = 'section-' + i;
      h.id = id;
      const li = document.createElement('li');
      li.innerHTML = `<a href="#${id}">${h.textContent}</a>`;
      list.appendChild(li);
    }
  });
}

loadTerms();
</script>
</body>
</html>
